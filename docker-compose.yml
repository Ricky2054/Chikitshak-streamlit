services:
  medical-rag:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DISABLE_AUTH=1
      - LLM_PROVIDER=openrouter
      - EMBEDDING_PROVIDER=local
    volumes:
      - kb-cache:/app/.cache/vectorstore
    restart: unless-stopped

volumes:
  kb-cache:

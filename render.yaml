# Render.com blueprint — deploy backend API
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: medical-rag-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /healthz
    envVars:
      - key: DISABLE_AUTH
        value: "1"
      - key: LLM_PROVIDER
        value: openrouter
      - key: EMBEDDING_PROVIDER
        value: local
      - key: OPENROUTER_API_KEY
        sync: false
